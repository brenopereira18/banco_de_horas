version: '3.8'

services:
    postgres:
        container_name: annual_leave_postgres
        image: postgres
        ports:
            - 5432:5432

        env_file:
            - .env
        volumes:
            - postgres_data:/var/lib/postgresql/data

    app:
        container_name: banco_horas_app
        build: .
        ports:
            - 8080:8080
        env_file:
            - .env
        depends_on:
            - postgres
        restart: always

volumes:
    postgres_data: