services:
    postgres:
        container_name: annual_leave_postgres
        image: postgres:16
        ports:
            - 5432:5432
        env_file:
            - .env.dev
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data

volumes:
    postgres_data: