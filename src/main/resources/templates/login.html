<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Banco de Horas</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-gray-100 min-h-screen">

<div class="min-h-screen flex items-center justify-center p-6">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">

        <div class="flex justify-center mb-8">
            <img th:src="@{/images/logo_sedupp.png}" alt="Logo SEDUPP" class="h-16 sm:h-24 w-auto"/>
        </div>

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Banco de Horas</h2>

        <div th:if="${param.error}" data-feedback
             class="bg-red-50 border-l-4 border-red-500 text-red-700 text-xs px-4 py-3 rounded mb-4">
            ⚠️ Matrícula ou senha inválidos
        </div>

        <div th:if="${param.logout}" data-feedback
             class="bg-green-50 border-l-4 border-green-500 text-green-700 px-4 py-3 rounded mb-6">
            ✅ Você saiu com sucesso
        </div>

        <form th:action="@{/banco_de_horas/dashboard/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">
                    Matrícula
                </label>
                <input type="text" id="username" name="registration" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       oninput="formatRegistration(this)">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">
                    Senha
                </label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200 mt-6">
                Entrar
            </button>
        </form>

        <div class="mt-4 text-center">
            <a th:href="@{/banco_de_horas/dashboard/esqueci-senha}"
               class="text-sm text-blue-600 hover:underline transition-colors">
                Esqueci minha senha
            </a>
        </div>
    </div>
</div>

<script th:src="@{/js/utils.js}"></script>
</body>
</html>
