<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Administrador</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans h-full">

<div class="container mx-auto p-6 max-w-7xl">

    <!-- Header Section -->
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 space-y-4 sm:space-y-0">
        <div>
            <h1 class="text-2xl font-bold text-gray-900">Dashboard - Supervisor</h1>
            <p class="text-lg text-gray-600 mt-1">Bem-vindo, <span th:text="${userName}">Eduardo</span></p>
        </div>
        <a href="/logout"
           class="flex items-center space-x-2 px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold transition-colors duration-200">
            <span>→</span>
            <span>Sair</span>
        </a>
    </header>

    <!-- Navigation Tabs -->
    <nav class="flex space-x-0 border-b border-gray-200 mb-6">
        <button class="tab-button bg-white text-blue-600 border-b-2 border-blue-600 font-semibold px-6 py-3 hover:text-blue-600 focus:outline-none transition-colors duration-200 -mb-px">
            Fiscais
        </button>
        <a href="/feriados"
           class="tab-button px-6 py-3 text-gray-500 hover:text-blue-600 focus:outline-none transition-colors duration-200 -mb-px">
            Feriados
        </a>
        <div class="flex-grow border-b border-gray-200 -mb-px"></div>
    </nav>

    <!-- Main Content Area: Lista de Fiscais -->
    <main class="bg-white p-6 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-200">
            <h2 class="text-xl font-semibold text-gray-800">Lista de Fiscais</h2>
            <button onclick="toggleModal(true)"
                    class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
                <img th:src="@{/images/user-plus.svg}" alt="Ícone" class="mr-2 h-4 w-4" />
                Adicionar Fiscal
            </button>
        </div>

        <div th:unless="${fiscais.isEmpty()}" class="">

            <div th:each="fiscal : ${fiscais}"
                 class="flex items-center justify-between p-2 border-b border-gray-150 last:border-b-0 hover:bg-gray-100 rounded-md transition-colors duration-150">

                <!-- Dados do Fiscal -->
                <div class="flex-1">
                    <p class="font-semibold text-gray-700"
                       th:text="${fiscal.fullName}">
                        Nome Completo do Fiscal
                    </p>

                    <p class="text-sm text-gray-500">
                        Saldo de Horas:
                        <span class="font-medium"
                              th:text="${#numbers.formatDecimal(fiscal.balanceOfHours, 1, 'POINT', 2, 'COMMA')}">
                    0,00
                </span>
                        horas
                    </p>
                </div>

                <!-- Ações -->
                <div class="flex items-center space-x-2">
                    <button
                            class="px-3 py-1 text-xs bg-blue-100 text-blue-700 rounded-md hover:bg-blue-200 transition-colors duration-200">
                        Ver Detalhes
                    </button>

                    <button
                            class="px-3 py-1 text-xs bg-green-100 text-green-700 rounded-md hover:bg-green-200 transition-colors duration-200">
                        Adicionar Serviço
                    </button>

                    <button
                            class="px-3 py-1 text-xs bg-orange-100 text-orange-700 rounded-md hover:bg-orange-200 transition-colors duration-200">
                        Usar Folga
                    </button>
                </div>

            </div>
        </div>

        <!-- Caso não existam fiscais -->
        <div th:if="${fiscais.isEmpty()}"
             class="p-6 text-center text-gray-500">
            Nenhum fiscal cadastrado.
        </div>
    </main>

</div>

<!-- Modal para Adicionar Fiscal -->
<div id="addFiscalModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md mx-4">
        <div class="flex justify-between items-center mb-4 pb-4 border-b border-gray-200">
            <h3 class="text-xl font-semibold text-gray-800">Adicionar Novo Fiscal</h3>
            <button onclick="toggleModal(false)" class="text-gray-400 hover:text-gray-600 transition-colors duration-200">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <form id="addFiscalForm" action="/banco_de_horas/dashboard/criar/fiscal" method="POST">
            <div class="mb-4">
                <label for="fullName" class="block text-gray-700 text-sm font-bold mb-2">Nome Completo:</label>
                <input type="text" id="fullName" name="fullName" placeholder="Digite o nome completo"
                       class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       required>
            </div>

            <div class="mb-4">
                <label for="registration" class="block text-gray-700 text-sm font-bold mb-2">Matrícula:</label>
                <input type="text" id="registration" name="registration" placeholder="Digite a matrícula"
                       class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       required>
            </div>

            <div class="mb-6">
                <label for="userType" class="block text-gray-700 text-sm font-bold mb-2">Tipo de Usuário:</label>
                <select id="userType" name="userType"
                        class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        required>
                    <option value="">Selecione o tipo</option>
                    <option value="FISCAL">Fiscal</option>
                    <option value="SUPERVISOR">Supervisor</option>
                    <option value="ADMINISTRADOR">Administrador</option>
                </select>
            </div>

            <div class="flex justify-end gap-3">
                <button type="button" onclick="toggleModal(false)"
                        class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
                    Cancelar
                </button>
                <button type="submit"
                        class="px-4 py-2 border border-transparent rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors duration-200">
                    Salvar Fiscal
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleModal(show) {
        const modal = document.getElementById('addFiscalModal');
        const body = document.body;

        if (show) {
            modal.classList.remove('hidden');
            body.classList.add('overflow-hidden'); // Tailwind para impedir scroll
            // Foca no primeiro campo quando abre
            document.getElementById('fullName').focus();
        } else {
            modal.classList.add('hidden');
            body.classList.remove('overflow-hidden'); // Tailwind para restaurar scroll
            // Limpa o formulário quando fecha
            document.getElementById('addFiscalForm').reset();
        }
    }

    // Fechar modal ao clicar fora dele
    document.getElementById('addFiscalModal').addEventListener('click', function(event) {
        if (event.target === this) {
            toggleModal(false);
        }
    });

    // Fechar modal com tecla ESC
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Escape' && !document.getElementById('addFiscalModal').classList.contains('hidden')) {
            toggleModal(false);
        }
    });

    // Validação do formulário
    document.getElementById('addFiscalForm').addEventListener('submit', function(event) {
        const fullName = document.getElementById('fullName').value.trim();
        const registration = document.getElementById('registration').value.trim();
        const userType = document.getElementById('userType').value;

        if (!fullName || !registration || !userType) {
            event.preventDefault();
            alert('Por favor, preencha todos os campos obrigatórios.');
            return;
        }

        if (fullName.length < 2) {
            event.preventDefault();
            alert('Nome completo deve ter pelo menos 2 caracteres.');
            return;
        }

        const registrationRegex = /^[a-zA-Z0-9]+$/;
        if (!registrationRegex.test(registration)) {
            event.preventDefault();
            alert('Matrícula deve conter apenas letras e números.');
            return;
        }
    });

    // Gerenciar estado ativo das abas usando apenas Tailwind
    document.addEventListener('DOMContentLoaded', function() {
        const activeTab = document.querySelector('.tab-button');
        if (activeTab) {
            activeTab.classList.add('bg-white', 'text-blue-600', 'border-b-2', 'border-blue-600', 'font-semibold');
        }
    });
</script>

</body>
</html>
