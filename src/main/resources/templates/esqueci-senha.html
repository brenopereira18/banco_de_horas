<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci a Senha - Banco de Horas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">

    <div class="flex justify-center mb-6">
        <img th:src="@{/images/logo_sedupp.png}" alt="Juiz de Fora" class="h-16">
    </div>

    <h1 class="text-xl font-bold text-center text-gray-800 mb-1">Esqueci minha senha</h1>
    <p class="text-sm text-center text-gray-500 mb-6">
        Informe seu e-mail cadastrado e enviaremos as instruções.
    </p>

    <div th:if="${sucesso}"
         class="bg-green-50 border border-green-300 text-green-700 px-4 py-3 rounded-lg mb-4 text-sm">
        <span th:text="${sucesso}"></span>
    </div>

    <div th:if="${erro}"
         class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
        <span th:text="${erro}"></span>
    </div>

    <form th:action="@{/banco_de_horas/dashboard/esqueci-senha}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
        <input id="email" type="email" name="email" required autocomplete="email"
               class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-5
                      focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
               placeholder="seu@email.com">

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                       py-2.5 px-4 rounded-lg transition duration-200">
            Enviar instruções
        </button>
    </form>

    <div class="mt-5 text-center">
        <a th:href="@{/banco_de_horas/dashboard/login}"
           class="text-sm text-blue-600 hover:underline">Voltar ao login</a>
    </div>
</div>
</body>
</html>
