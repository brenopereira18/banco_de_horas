<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetar senha - Banco de Horas</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">

    <div class="flex justify-center mb-6">
        <img th:src="@{/images/logo_sedupp.png}" alt="Juiz de Fora" class="h-16">
    </div>

    <h1 class="text-xl font-bold text-center text-gray-800 mb-6">Redefinir senha</h1>

    <!-- Token inválido ou expirado -->
    <div th:if="${tokenInvalido}"
         class="bg-red-50 border border-red-300 text-red-700 px-4 py-4 rounded-lg text-sm text-center">
        <p class="font-semibold mb-1">Link inválido ou expirado</p>
        <p class="mb-3">Este link é de uso único e válido por 1 hora.</p>
        <a th:href="@{/banco_de_horas/dashboard/esqueci-senha}"
           class="inline-block bg-red-600 hover:bg-red-700 text-white text-sm
                  font-semibold py-2 px-4 rounded-lg transition">
            Solicitar novo link
        </a>
    </div>

    <!-- Erro de validação -->
    <div th:if="${erro}" data-feedback
         class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
        <span th:text="${erro}"></span>
    </div>

    <!-- Formulário só aparece com token válido -->
    <form th:if="${token}"
          th:action="@{/banco_de_horas/dashboard/reset-senha}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="token" th:value="${token}">

        <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-1">
            Nova senha
        </label>
        <input id="newPassword" type="password" name="newPassword" required
               minlength="7" autocomplete="new-password"
               class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-1
                      focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
               placeholder="Mínimo 7 caracteres">
        <p class="text-xs text-gray-400 mb-4">Deve ter ao menos 7 caracteres.</p>

        <label for="passwordConfirmation" class="block text-sm font-medium text-gray-700 mb-1">
            Confirmar senha
        </label>
        <input id="passwordConfirmation" type="password" name="passwordConfirmation" required
               minlength="7" autocomplete="new-password"
               class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-5
                      focus:outline-none focus:ring-2 focus:ring-blue-500 transition"
               placeholder="Repita a nova senha">

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold
                       py-2.5 px-4 rounded-lg transition duration-200">
            Salvar nova senha
        </button>
    </form>

    <div class="mt-5 text-center">
        <a th:href="@{/banco_de_horas/dashboard/login}"
           class="text-sm text-blue-600 hover:underline">
            Voltar ao login
        </a>
    </div>
</div>

<script th:src="@{/js/utils.js}"></script>
</body>
</html>
