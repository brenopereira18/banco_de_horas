spring:
  application:
    name: banco_de_horas

  datasource:
    url: jdbc:***REMOVED***ql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.***REMOVED***ql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: true
    check-template: true
    check-template-location: true
    servlet:
      content-type: text/html

  devtools:
    restart:
      enabled: false
      additional-paths: src/main/java
    livereload:
      enabled: false
      port: 35729
    remote:
      restart:
        enabled: false

  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

server:
  port: 8080
